<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --surface-raised: #f0f0f5;
      --border: rgba(0,0,0,0.08);
      --border-accent: rgba(0,0,0,0.12);
      --text-primary: #1a1a2e;
      --text-secondary: #5a5a72;
      --text-tertiary: #9898b0;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 999px;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .app {
      width: 100%;
      max-width: 460px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6c5ce7 0%, #3b82f6 60%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Section labels ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    /* ── People grid ── */
    .people-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 28px;
    }

    .person-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }
    .person-btn:hover { background: var(--surface-raised); border-color: var(--border-accent); }
    .person-btn:active { transform: scale(0.97); }
    .person-btn.selected {
      border-color: var(--accent-border, rgba(255,255,255,0.3));
      background: var(--accent-bg, rgba(255,255,255,0.07));
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .person-info { display: flex; flex-direction: column; gap: 1px; }
    .person-name { font-size: 14px; font-weight: 500; }
    .person-sub { font-size: 11px; color: var(--text-tertiary); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 28px;
    }

    /* ── Spin button ── */
    .spin-btn {
      width: 100%;
      padding: 15px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: 1px solid rgba(108, 92, 231, 0.3);
      background: linear-gradient(135deg, rgba(108,92,231,0.1) 0%, rgba(59,130,246,0.08) 100%);
      color: #5b4fcf;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
      letter-spacing: 0.01em;
      margin-bottom: 24px;
    }
    .spin-btn:hover { background: linear-gradient(135deg, rgba(108,92,231,0.18) 0%, rgba(59,130,246,0.14) 100%); }
    .spin-btn:active { transform: scale(0.98); }
    .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Result area ── */
    .result-area {
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }

    .result-placeholder {
      font-size: 14px;
      color: var(--text-tertiary);
      text-align: center;
      line-height: 1.6;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      text-align: center;
      width: 100%;
    }

    .result-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      margin: 0 auto 14px;
    }

    .result-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .result-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cycling-name {
      font-size: 28px;
      font-weight: 700;
      font-family: ui-monospace, "SF Mono", monospace;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ── History ── */
    .history-section { }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .history-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .history-name {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
    }
    .history-date {
      font-size: 11px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }
    .history-empty {
      font-size: 13px;
      color: var(--text-tertiary);
      padding: 12px 0;
      text-align: center;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .action-btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.01em;
    }
    .action-btn:hover { background: var(--surface-raised); color: var(--text-primary); }
    .action-btn.danger:hover { border-color: rgba(255,80,80,0.4); color: #ff8080; }

    /* ── Save status ── */
    .save-status {
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
      color: var(--text-tertiary);
      transition: color 0.2s;
    }
    .save-status.saving { color: var(--text-tertiary); }
    .save-status.saved  { color: #10b981; }
    .save-status.error  { color: #ef4444; }

    /* ── Animations ── */
    @keyframes pop {
      0%   { transform: scale(0.82); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .pulsing { animation: pulse 0.6s ease-in-out infinite; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <p class="header-eyebrow">Weekly standup</p>
    <h1>MC Picker</h1>
  </div>

  <!-- Last week -->
  <p class="section-label">Who was MC last week?</p>
  <div class="people-grid" id="peopleGrid"></div>

  <div class="divider"></div>

  <!-- Spin -->
  <button class="spin-btn" id="spinBtn" disabled>Pick next MC</button>

  <!-- Result -->
  <div class="result-area" id="resultArea">
    <p class="result-placeholder">Select last week's MC<br>to get started</p>
  </div>

  <!-- History -->
  <p class="section-label">Recent history</p>
  <div class="history-list" id="historyList"></div>
  <div id="saveStatus" class="save-status"></div>

</div>

<script>
// ── GitHub config ─────────────────────────────────────────────────────────────
// Paste your fine-grained PAT here (Contents: Read & Write on dmd repo)
const GITHUB_TOKEN = "YOUR_GITHUB_TOKEN_HERE";
const GITHUB_REPO  = "RMIT-VE-LearningExperience/dmd";
const GITHUB_PATH  = "mc_picker/mc_history.json";
const API_BASE     = `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_PATH}`;

// ── People ────────────────────────────────────────────────────────────────────
const people = [
  { name: "Lawrence", initials: "LW", color: "#9b8fff", bg: "rgba(155,143,255,0.15)", text: "#5b4fcf" },
  { name: "Homie",    initials: "HM", color: "#34d399", bg: "rgba(52,211,153,0.12)",  text: "#059669" },
  { name: "Neda",     initials: "ND", color: "#f472b6", bg: "rgba(244,114,182,0.13)", text: "#be185d" },
  { name: "Arielle",  initials: "AR", color: "#60a5fa", bg: "rgba(96,165,250,0.13)",  text: "#1d4ed8" },
];

// ── State ─────────────────────────────────────────────────────────────────────
let lastWeekMC  = null;
let isSpinning  = false;
let currentSha  = null;   // SHA of the file on GitHub (required to update it)
let ghHistory   = [];     // in-memory copy of mc_history

// ── Elements ──────────────────────────────────────────────────────────────────
const peopleGrid  = document.getElementById("peopleGrid");
const spinBtn     = document.getElementById("spinBtn");
const resultArea  = document.getElementById("resultArea");
const historyList = document.getElementById("historyList");
const saveStatus  = document.getElementById("saveStatus");

// ── GitHub helpers ────────────────────────────────────────────────────────────
function ghHeaders() {
  return {
    "Authorization": `Bearer ${GITHUB_TOKEN}`,
    "Accept": "application/vnd.github+json",
    "Content-Type": "application/json",
  };
}

async function fetchFromGitHub() {
  const res = await fetch(API_BASE, { headers: ghHeaders() });
  if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
  const data = await res.json();
  currentSha = data.sha;
  const decoded = JSON.parse(atob(data.content));
  ghHistory = decoded.mc_history || [];
}

async function saveToGitHub(newEntry) {
  ghHistory.unshift(newEntry);

  const body = JSON.stringify({
    message: `MC pick: ${newEntry.winner} on ${newEntry.date}`,
    content: btoa(JSON.stringify({ mc_history: ghHistory }, null, 2)),
    sha: currentSha,
  });

  const res = await fetch(API_BASE, { method: "PUT", headers: ghHeaders(), body });
  if (!res.ok) throw new Error(`GitHub save failed: ${res.status}`);
  const data = await res.json();
  currentSha = data.content.sha; // update SHA for next write
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  saveStatus.className = `save-status ${state}`;
  saveStatus.textContent = msg;
}

function formatDate(iso) {
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function renderHistory() {
  if (!ghHistory.length) {
    historyList.innerHTML = `<p class="history-empty">No picks yet</p>`;
    return;
  }
  historyList.innerHTML = ghHistory.slice(0, 6).map(entry => {
    const p = people.find(x => x.name === entry.winner);
    const avatarStyle = p ? `background:${p.bg};color:${p.text}` : "";
    const initials = p ? p.initials : entry.winner.slice(0, 2).toUpperCase();
    return `
      <div class="history-item">
        <div class="history-avatar" style="${avatarStyle}">${initials}</div>
        <span class="history-name">${entry.winner}</span>
        <span class="history-date">${formatDate(entry.date)}</span>
      </div>`;
  }).join("");
}

// ── People grid ───────────────────────────────────────────────────────────────
people.forEach(p => {
  const btn = document.createElement("button");
  btn.className = "person-btn";
  btn.dataset.name = p.name;
  btn.style.setProperty("--accent-border", p.color + "80");
  btn.style.setProperty("--accent-bg", p.bg);
  btn.innerHTML = `
    <div class="avatar" style="background:${p.bg};color:${p.text}">${p.initials}</div>
    <div class="person-info"><span class="person-name">${p.name}</span></div>`;
  btn.addEventListener("click", () => {
    if (isSpinning) return;
    document.querySelectorAll(".person-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    lastWeekMC = p.name;
    spinBtn.disabled = false;
    spinBtn.textContent = "Pick next MC";
    const pool = people.filter(x => x.name !== lastWeekMC).map(x => x.name).join(", ");
    resultArea.innerHTML = `<p class="result-placeholder">Pool: ${pool}</p>`;
  });
  peopleGrid.appendChild(btn);
});

// ── Spin ──────────────────────────────────────────────────────────────────────
spinBtn.addEventListener("click", () => {
  if (!lastWeekMC || isSpinning) return;
  const pool = people.filter(p => p.name !== lastWeekMC);
  isSpinning = true;
  spinBtn.disabled = true;
  document.querySelectorAll(".person-btn").forEach(b => b.style.pointerEvents = "none");

  const STEPS = 24;
  let count = 0;
  let idx = Math.floor(Math.random() * pool.length);

  resultArea.innerHTML = `<div class="result-card"><div class="cycling-name pulsing" id="cycleText">···</div></div>`;
  const cycleText = document.getElementById("cycleText");

  function getDelay(i) {
    if (i < 8)  return 60;
    if (i < 16) return 100;
    return 160;
  }

  function tick() {
    cycleText.textContent = pool[idx % pool.length].name;
    idx++;
    count++;
    if (count >= STEPS) {
      const winner = pool[Math.floor(Math.random() * pool.length)];
      setTimeout(() => showWinner(winner), getDelay(count));
      return;
    }
    setTimeout(tick, getDelay(count));
  }
  setTimeout(tick, 60);
});

async function showWinner(p) {
  resultArea.innerHTML = `
    <div class="result-card pop">
      <div class="result-avatar" style="background:${p.bg};color:${p.text}">${p.initials}</div>
      <p class="result-name" style="color:${p.text}">${p.name}</p>
      <p class="result-label">Next week's MC 🎙️</p>
    </div>`;

  const entry = {
    winner: p.name,
    lastMC: lastWeekMC,
    date: new Date().toISOString().slice(0, 10),
    ts: Date.now(),
  };

  setStatus("saving", "Saving to GitHub…");
  try {
    await saveToGitHub(entry);
    renderHistory();
    setStatus("saved", "Saved to GitHub ✓");
    setTimeout(() => setStatus("", ""), 3000);
  } catch (err) {
    console.error(err);
    setStatus("error", "Could not save — check token or network");
  }

  setTimeout(() => {
    isSpinning = false;
    spinBtn.disabled = false;
    spinBtn.textContent = "Pick again";
    document.querySelectorAll(".person-btn").forEach(b => b.style.pointerEvents = "");
  }, 600);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  setStatus("saving", "Loading history…");
  try {
    await fetchFromGitHub();
    renderHistory();
    setStatus("", "");
  } catch (err) {
    console.error(err);
    setStatus("error", "Could not load history — check token");
  }
})();
</script>
</body>
</html>
